[package]
name = "nightglow-wasm"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
nightglow-core = { path = "../../crates/nightglow-core" }
nightglow-data = { path = "../../crates/nightglow-data" }
nightglow-environment = { path = "../../crates/nightglow-environment" }
nightglow-physics = { path = "../../crates/nightglow-physics" }
nightglow-solver = { path = "../../crates/nightglow-solver" }

[lints.rust]
unsafe_code = "allow"

[lints.clippy]
all = "warn"
pedantic = "warn"
