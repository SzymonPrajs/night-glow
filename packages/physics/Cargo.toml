[workspace]
resolver = "3"
members = [
  "crates/nightglow-core",
  "crates/nightglow-astronomy",
  "crates/nightglow-data",
  "crates/nightglow-environment",
  "crates/nightglow-physics",
  "crates/nightglow-solver",
  "crates/nightglow-validation",
  "apps/precompute",
  "bindings/wasm",
]

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
rust-version = "1.85"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[workspace.lints.rust]
unsafe_code = "deny"

[workspace.lints.clippy]
all = "warn"
pedantic = "warn"
