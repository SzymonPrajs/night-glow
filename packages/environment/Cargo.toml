[workspace]
resolver = "3"
members = [
  "crates/environment-core",
  "crates/environment-manifest",
  "crates/emission-schema",
  "crates/emission-core",
  "crates/atmosphere-schema",
  "crates/atmosphere-format",
  "crates/environment-conformance",
  "bindings/wasm",
]

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
rust-version = "1.85"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
all = "warn"
pedantic = "warn"
