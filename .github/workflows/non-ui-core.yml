name: Non-UI core

on:
  pull_request:
    paths:
      - '.github/workflows/non-ui-core.yml'
      - '.nvmrc'
      - 'rust-toolchain.toml'
      - 'Makefile'
      - 'implementation/**'
      - 'packages/contracts/**'
      - 'packages/environment/**'
      - 'packages/physics/**'
      - 'runtime/browser-worker/**'
      - 'tools/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/non-ui-core.yml'
      - '.nvmrc'
      - 'rust-toolchain.toml'
      - 'Makefile'
      - 'implementation/**'
      - 'packages/contracts/**'
      - 'packages/environment/**'
      - 'packages/physics/**'
      - 'runtime/browser-worker/**'
      - 'tools/**'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: runtime/browser-worker/package-lock.json
      - run: rustup toolchain install 1.97.0 --profile minimal --component rustfmt --target wasm32-unknown-unknown
      - run: make non-ui-check
